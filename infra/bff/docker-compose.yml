services:
  bff:
    build:
      context: ../..
      dockerfile: infra/bff/Dockerfile
    env_file:
      - ../../bff/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
