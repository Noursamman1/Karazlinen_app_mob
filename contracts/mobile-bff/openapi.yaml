openapi: 3.1.0
info:
  title: Karaz Linen Mobile BFF API
  version: 1.0.0
  description: Canonical contract between the Karaz Linen Flutter app and the Mobile BFF.
servers:
  - url: https://api.example.com
paths:
  /v1/auth/login:
    post:
      summary: Authenticate an existing website customer and start a mobile session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: './schemas/common.yaml#/components/schemas/ErrorResponse'
  /v1/auth/refresh:
    post:
      summary: Rotate the current refresh token and issue a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Refreshed session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
  /v1/auth/logout:
    post:
      summary: Revoke the current mobile session
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
  /v1/auth/me:
    get:
      summary: Fetch the active session and customer summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionBootstrap'
  /v1/catalog/categories:
    get:
      summary: Fetch catalog categories
      responses:
        '200':
          description: Category tree
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
  /v1/catalog/products:
    get:
      summary: Fetch paginated product listing
      parameters:
        - in: query
          name: query
          schema:
            type: string
          description: Full-text search query for product name, subtitle, or indexed search fields.
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: filters
          style: deepObject
          explode: true
          schema:
            type: object
            additionalProperties:
              type: array
              items:
                type: string
          description: Facet selections keyed by facet code, for example `filters[material]=قطن`.
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: sort
          schema:
            $ref: '#/components/schemas/CatalogSortOption'
      responses:
        '200':
          description: Product listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListingResponse'
  /v1/catalog/products/{productId}:
    get:
      summary: Fetch product detail
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /v1/account/profile:
    get:
      summary: Fetch customer profile summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
  /v1/account/addresses:
    get:
      summary: Fetch customer addresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
    post:
      summary: Create customer address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
  /v1/account/addresses/{addressId}:
    patch:
      summary: Update customer address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: addressId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
    delete:
      summary: Delete customer address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: addressId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Address deleted
  /v1/orders:
    get:
      summary: Fetch customer orders
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: object
                required: [items, meta]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderSummary'
                  meta:
                    $ref: './schemas/common.yaml#/components/schemas/PaginationMeta'
  /v1/orders/{orderNumber}:
    get:
      summary: Fetch order detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderNumber
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
  /v1/cart:
    get:
      summary: Fetch the authenticated customer's active mobile cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/cart/items:
    post:
      summary: Add an item to the active cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemInput'
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/cart/items/{itemId}:
    patch:
      summary: Update quantity for a cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemQuantityInput'
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
    delete:
      summary: Remove an item from the active cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/cart/addresses:
    put:
      summary: Assign shipping and billing addresses for checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartAddressAssignmentInput'
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/cart/shipping-methods:
    get:
      summary: List available shipping methods for the current cart state
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available shipping methods
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShippingMethod'
  /v1/cart/shipping-method:
    put:
      summary: Select the shipping method for the active cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectedShippingMethodInput'
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/cart/payment-methods:
    get:
      summary: List available payment methods for the current cart state
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available payment methods
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
  /v1/cart/payment-method:
    put:
      summary: Select the payment method for the active cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectedPaymentMethodInput'
      responses:
        '200':
          description: Updated cart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/checkout/place-order:
    post:
      summary: Place the current order from the authenticated cart
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderInput'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceOrderResult'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SessionResponse:
      type: object
      required: [accessToken, refreshToken, expiresInSeconds]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInSeconds:
          type: integer
    SessionBootstrap:
      type: object
      required: [authenticated, profile]
      properties:
        authenticated:
          type: boolean
        profile:
          $ref: '#/components/schemas/Profile'
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        image:
          $ref: './schemas/common.yaml#/components/schemas/Image'
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    ProductSummary:
      type: object
      required: [id, sku, slug, name, price, stockStatus]
      properties:
        id:
          type: string
        sku:
          type: string
        slug:
          type: string
        name:
          type: string
        subtitle:
          type: string
          nullable: true
        thumbnail:
          $ref: './schemas/common.yaml#/components/schemas/Image'
        price:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        compareAtPrice:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        stockStatus:
          $ref: '#/components/schemas/StockStatus'
    ProductListingResponse:
      type: object
      required: [items, meta, aggregations]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        meta:
          $ref: './schemas/common.yaml#/components/schemas/PaginationMeta'
        aggregations:
          type: array
          items:
            $ref: '#/components/schemas/FacetAggregation'
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          required: [gallery, configurableOptions, variantResolution]
          properties:
            gallery:
              type: array
              items:
                $ref: './schemas/common.yaml#/components/schemas/Image'
            description:
              type: string
              nullable: true
            configurableOptions:
              type: array
              items:
                $ref: '#/components/schemas/ConfigurableOption'
            variantResolution:
              $ref: '#/components/schemas/VariantResolution'
    CatalogSortOption:
      type: string
      enum: [featured, price_asc, price_desc]
    StockStatus:
      type: string
      enum: [in_stock, low_stock, out_of_stock]
    FacetAggregation:
      type: object
      required: [code, label, values]
      properties:
        code:
          type: string
        label:
          type: string
        values:
          type: array
          items:
            $ref: '#/components/schemas/FacetAggregationValue'
    FacetAggregationValue:
      type: object
      required: [value, label, count]
      properties:
        value:
          type: string
        label:
          type: string
        count:
          type: integer
    ConfigurableOption:
      type: object
      required: [code, label, values]
      properties:
        code:
          type: string
        label:
          type: string
        values:
          type: array
          items:
            type: object
            required: [value, label, available]
            properties:
              value:
                type: string
              label:
                type: string
              available:
                type: boolean
    VariantResolution:
      type: object
      required: [mode, combinations]
      properties:
        mode:
          type: string
          enum: [base_product, resolved_combinations]
        combinations:
          type: array
          items:
            $ref: '#/components/schemas/ConfigurableVariantCombination'
        unresolvedReason:
          type: string
          nullable: true
    ConfigurableVariantCombination:
      type: object
      required: [selection, resolvedSku, availability, price]
      properties:
        selection:
          type: object
          additionalProperties:
            type: string
        resolvedSku:
          type: string
        availability:
          $ref: '#/components/schemas/StockStatus'
        image:
          $ref: './schemas/common.yaml#/components/schemas/Image'
        price:
          $ref: './schemas/common.yaml#/components/schemas/Money'
    Profile:
      type: object
      required: [customerId, firstName, lastName, email]
      properties:
        customerId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
    Address:
      type: object
      required: [id, firstName, lastName, phone, country, city, streetLines, postcode, isDefaultBilling, isDefaultShipping]
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        country:
          type: string
        city:
          type: string
        region:
          type: string
          nullable: true
        streetLines:
          type: array
          items:
            type: string
        postcode:
          type: string
        isDefaultBilling:
          type: boolean
        isDefaultShipping:
          type: boolean
    AddressInput:
      type: object
      required: [firstName, lastName, phone, country, city, streetLines, postcode]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        country:
          type: string
        city:
          type: string
        region:
          type: string
        streetLines:
          type: array
          minItems: 1
          items:
            type: string
        postcode:
          type: string
        isDefaultBilling:
          type: boolean
        isDefaultShipping:
          type: boolean
    OrderSummary:
      type: object
      required: [orderNumber, placedAt, statusCode, statusLabel, grandTotal]
      properties:
        orderNumber:
          type: string
        placedAt:
          type: string
          format: date-time
        statusCode:
          type: string
        statusLabel:
          type: string
        grandTotal:
          $ref: './schemas/common.yaml#/components/schemas/Money'
    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          required: [items]
          properties:
            shippingAddress:
              $ref: '#/components/schemas/Address'
            billingAddress:
              $ref: '#/components/schemas/Address'
            items:
              type: array
              items:
                type: object
                required: [sku, name, quantity, total]
                properties:
                  sku:
                    type: string
                  name:
                    type: string
                  quantity:
                    type: integer
                  total:
                    $ref: './schemas/common.yaml#/components/schemas/Money'
    Cart:
      type: object
      required: [id, currencyCode, itemCount, items, totals, checkout]
      properties:
        id:
          type: string
        currencyCode:
          type: string
        itemCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totals:
          $ref: '#/components/schemas/CartTotals'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
        selectedShippingMethod:
          $ref: '#/components/schemas/ShippingMethod'
        selectedPaymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        checkout:
          $ref: '#/components/schemas/CheckoutState'
    CartItem:
      type: object
      required: [itemId, productId, sku, name, quantity, unitPrice, lineTotal]
      properties:
        itemId:
          type: string
        productId:
          type: string
        sku:
          type: string
        name:
          type: string
        thumbnail:
          $ref: './schemas/common.yaml#/components/schemas/Image'
        quantity:
          type: integer
        selectedOptions:
          type: array
          items:
            $ref: '#/components/schemas/SelectedOption'
        unitPrice:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        lineTotal:
          $ref: './schemas/common.yaml#/components/schemas/Money'
    SelectedOption:
      type: object
      required: [code, label, value]
      properties:
        code:
          type: string
        label:
          type: string
        value:
          type: string
    CartTotals:
      type: object
      required: [subtotal, grandTotal]
      properties:
        subtotal:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        shipping:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        tax:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        discount:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        grandTotal:
          $ref: './schemas/common.yaml#/components/schemas/Money'
    CheckoutState:
      type: object
      required: [ready, blockers]
      properties:
        ready:
          type: boolean
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutBlocker'
    CheckoutBlocker:
      type: string
      enum:
        - cart_empty
        - shipping_address_missing
        - billing_address_missing
        - shipping_method_missing
        - payment_method_missing
    ShippingMethod:
      type: object
      required: [carrierCode, methodCode, label, amount, selected]
      properties:
        carrierCode:
          type: string
        methodCode:
          type: string
        label:
          type: string
        detail:
          type: string
          nullable: true
        amount:
          $ref: './schemas/common.yaml#/components/schemas/Money'
        selected:
          type: boolean
    PaymentMethod:
      type: object
      required: [code, label, selected]
      properties:
        code:
          type: string
        label:
          type: string
        detail:
          type: string
          nullable: true
        selected:
          type: boolean
    CartItemInput:
      type: object
      required: [sku, quantity]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        selectedOptions:
          type: object
          additionalProperties:
            type: string
    CartItemQuantityInput:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
    CartAddressAssignmentInput:
      type: object
      required: [sameAsShipping]
      properties:
        shippingAddressId:
          type: string
        shippingAddress:
          $ref: '#/components/schemas/AddressInput'
        billingAddressId:
          type: string
        billingAddress:
          $ref: '#/components/schemas/AddressInput'
        sameAsShipping:
          type: boolean
    SelectedShippingMethodInput:
      type: object
      required: [carrierCode, methodCode]
      properties:
        carrierCode:
          type: string
        methodCode:
          type: string
    SelectedPaymentMethodInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
    PlaceOrderInput:
      type: object
      required: [termsAccepted]
      properties:
        termsAccepted:
          type: boolean
        customerNote:
          type: string
          nullable: true
    PlaceOrderResult:
      type: object
      required: [orderNumber, status]
      properties:
        orderNumber:
          type: string
        status:
          type: string
          enum: [placed]
